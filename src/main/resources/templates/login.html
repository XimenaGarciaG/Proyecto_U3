<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Empresa Corporativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group" style="background: #f9f9f9; padding: 10px; border: 1px solid #d3d3d3; border-radius: 3px; display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="simulatedCaptcha" style="width: 24px; height: 24px; cursor: pointer;">
                    <label for="simulatedCaptcha" style="cursor: pointer; font-size: 14px; color: #555;">No soy un robot</label>
                    <div style="margin-left: auto; text-align: center;">
                        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" style="width: 30px; opacity: 0.8;"><br>
                        <small style="font-size: 8px; color: #9b9b9b;">reCAPTCHA (Simulado)</small>
                    </div>
                </div>
                <button type="submit" class="btn btn-block">Ingresar</button>
            </form>
            <div id="message" style="color: red; margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
