# Server Config
server.port=${PORT:8088}

# DB Config - Switch to H2 for Local / Postgres for Production (Render)
spring.datasource.url=${DB_URL:jdbc:h2:file:./db/proyecto;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuración
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Configuración
app.jwtSecret=${JWT_SECRET:antigravity_secret_key_must_be_long_enough_for_sha256_1234567890}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Google reCAPTCHA
app.recaptchaSecret=${RECAPTCHA_SECRET:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFojJ4WifJWe}
app.recaptcha.enabled=${RECAPTCHA_ENABLED:true}

# Manejo de archivos (imágenes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=INFO
