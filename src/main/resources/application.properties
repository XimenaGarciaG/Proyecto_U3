# Server Config
server.port=${PORT:8085}

# ============================================
# BASE DE DATOS - Supabase (Session Pooler IPv4)
# ============================================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?user=postgres.dpegwezjvejhxzqdnrll&password=lsKMR8Lw9tX9w5Tk&sslmode=require
spring.datasource.username=postgres.dpegwezjvejhxzqdnrll
spring.datasource.password=lsKMR8Lw9tX9w5Tk
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA Configuración
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
# never: evita que data.sql falle en Supabase (tablas ya existen)
spring.sql.init.mode=never

# JWT Configuración
app.jwtSecret=${JWT_SECRET:antigravity_secret_key_must_be_long_enough_for_sha256_1234567890}
app.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Google reCAPTCHA
app.recaptchaSecret=${RECAPTCHA_SECRET:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFojJ4WifJWe}
app.recaptcha.enabled=${RECAPTCHA_ENABLED:true}

# Manejo de archivos (imágenes)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=INFO
